services:
  app:
    build:
      context: .
      dockerfile: docker/build.Dockerfile
    ports:
      - "8000:8080"
    volumes:
      - .:/app
    environment:
      - ASPNETCORE_URLS=http://+:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
