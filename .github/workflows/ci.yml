name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Unit Tests
        run: dotnet test tests/DotnetTemplate.Tests.Unit --no-build --verbosity normal

      - name: Integration Tests
        run: dotnet test tests/DotnetTemplate.Tests.Integration --no-build --verbosity normal

      - name: Lint (Format check)
        run: dotnet format --verify-no-changes
